[theme]
primaryColor = "#3b82f6"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f7f6f3"
textColor = "#37352f"
font = "sans serif"

[logger]
level = "info"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
headless = true
port = 8501
maxUploadSize = 500
enableXsrfProtection = true
enableCORS = false
